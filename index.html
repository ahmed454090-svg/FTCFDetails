<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Budget - Micro Cashflow Manager</title>
    <style>
        :root {
            --bg-color: #0F172A;
            --card-bg: #1E293B;
            --accent-blue: #2563EB;
            --text-primary: #FFFFFF;
            --text-secondary: #94A3B8;
            --border-color: #334155;
            --success-green: #22C55E;
            --warning-yellow: #EAB308;
            --danger-red: #EF4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            padding: 16px;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .balance-title {
            font-size: 32px;
            font-weight: 700;
            margin: 8px 0 16px 0;
            color: var(--text-primary);
        }

        .progress-bar-bg {
            background-color: var(--border-color);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 100%;
            background-color: var(--success-green);
            transition: width 0.4s ease, background-color 0.4s ease;
        }

        .status-badge {
            font-size: 13px;
            font-weight: 600;
            color: var(--success-green);
        }

        .form-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        input {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: var(--text-primary);
            font-size: 15px;
            width: 100%;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-blue);
        }

        button {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.8;
        }

        .history-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border-color);
            flex-grow: 1;
        }

        .history-title {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .transaction-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background-color: var(--bg-color);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .item-note {
            font-weight: 500;
            font-size: 14px;
        }

        .item-date {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .item-amount {
            color: var(--danger-red);
            font-weight: 700;
            font-size: 15px;
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Top Budget Header -->
        <div class="header-card">
            <div class="subtitle">Remaining Monthly Budget</div>
            <div class="balance-title" id="balanceDisplay">Rs. 50,000.00</div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="healthBar"></div>
            </div>
            <div class="status-badge" id="statusText">🟢 Budget Safe Zone</div>
        </div>

        <!-- Expense Input Form -->
        <div class="form-card">
            <div class="input-row">
                <input type="number" id="amountInput" placeholder="Amount (e.g. 500)" id="amountInput">
                <input type="text" id="noteInput" placeholder="Note (Petrol, Lunch)">
            </div>
            <button onclick="addExpense()">+ Add Expense</button>
        </div>

        <!-- Recent Cashflow History -->
        <div class="history-card">
            <div class="history-title">Recent Transactions</div>
            <ul class="transaction-list" id="transactionList">
                <!-- Data will be loaded dynamically -->
            </ul>
        </div>
    </div>

    <script>
        const MONTHLY_BUDGET = 50000;
        let transactions = JSON.parse(localStorage.getItem('smart_budget_data')) || [];

        function updateUI() {
            const listElement = document.getElementById('transactionList');
            listElement.innerHTML = '';

            let totalSpent = 0;

            if (transactions.length === 0) {
                listElement.innerHTML = '<div class="empty-state">No transactions yet. Add your first expense above!</div>';
            } else {
                transactions.slice().reverse().forEach((item) => {
                    totalSpent += parseFloat(item.amount);

                    const li = document.createElement('li');
                    li.className = 'transaction-item';
                    li.innerHTML = `
                        <div>
                            <div class="item-note">${item.note}</div>
                            <div class="item-date">${item.date}</div>
                        </div>
                        <div class="item-amount">- Rs. ${parseFloat(item.amount).toFixed(2)}</div>
                    `;
                    listElement.appendChild(li);
                });
            }

            // Calculations
            const remaining = MONTHLY_BUDGET - totalSpent;
            document.getElementById('balanceDisplay').innerText = `Rs. ${remaining.toLocaleString('en-US', {minimumFractionDigits: 2})}`;

            // Health Bar Math
            let healthPercent = ((remaining) / MONTHLY_BUDGET) * 100;
            if (healthPercent < 0) healthPercent = 0;

            const healthBar = document.getElementById('healthBar');
            const statusText = document.getElementById('statusText');

            healthBar.style.width = `${healthPercent}%`;

            if (healthPercent >= 60) {
                healthBar.style.backgroundColor = 'var(--success-green)';
                statusText.innerText = '🟢 Budget Safe Zone';
                statusText.style.color = 'var(--success-green)';
            } else if (healthPercent >= 25) {
                healthBar.style.backgroundColor = 'var(--warning-yellow)';
                statusText.innerText = '🟡 Warning: Control Spending';
                statusText.style.color = 'var(--warning-yellow)';
            } else {
                healthBar.style.backgroundColor = 'var(--danger-red)';
                statusText.innerText = '🔴 Critical: Budget Low';
                statusText.style.color = 'var(--danger-red)';
            }
        }

        function addExpense() {
            const amountInput = document.getElementById('amountInput');
            const noteInput = document.getElementById('noteInput');

            const amount = parseFloat(amountInput.value);
            const note = noteInput.value.trim() || 'General Expense';

            if (isNaN(amount) || amount <= 0) {
                alert('Meharbani karke sahi amount likhein!');
                return;
            }

            const newTransaction = {
                amount: amount,
                note: note,
                date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
            };

            transactions.push(newTransaction);
            localStorage.setItem('smart_budget_data', JSON.stringify(transactions));

            amountInput.value = '';
            noteInput.value = '';

            updateUI();
        }

        // Initial Load
        updateUI();
    </script>
</body>
</html>
