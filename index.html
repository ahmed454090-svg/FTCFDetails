<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Studio Pro</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="border-b border-slate-800 bg-slate-950/50 backdrop-blur p-4 sticky top-0 z-10">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-400 flex items-center gap-2">
                <span>🚀</span> AI Content Studio
            </h1>
            <input type="password" id="apiKey" placeholder="Enter Gemini API Key..." 
                   class="bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-slate-200 focus:outline-none focus:border-indigo-500 w-48 sm:w-64">
        </div>
    </header>

    <!-- Main Container -->
    <main class="max-w-5xl mx-auto w-full p-4 sm:p-6 flex-1 grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- Controls Panel -->
        <div class="md:col-span-1 space-y-4 bg-slate-800/40 p-5 rounded-xl border border-slate-800 h-fit">
            <h2 class="text-lg font-semibold text-slate-200 border-b border-slate-700 pb-2">Generator Inputs</h2>
            
            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1">Topic / Video Idea</label>
                <input type="text" id="topicInput" placeholder="e.g., How to start AI Video creation" 
                       class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-slate-200 focus:outline-none focus:border-indigo-500">
            </div>

            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1">Content Type</label>
                <select id="contentType" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-slate-200 focus:outline-none focus:border-indigo-500">
                    <option value="youtube">YouTube Video Script & SEO</option>
                    <option value="shorts">YouTube Shorts / Reels Script</option>
                    <option value="thumbnail">AI Thumbnail Prompts</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-medium text-slate-400 mb-1">Tone</label>
                <select id="tone" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-slate-200 focus:outline-none focus:border-indigo-500">
                    <option value="engaging & energetic">Engaging & Energetic</option>
                    <option value="professional & informative">Professional & Informative</option>
                    <option value="funny & casual">Funny & Casual</option>
                </select>
            </div>

            <button id="generateBtn" onclick="generateContent()" 
                    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 rounded-lg transition-all flex items-center justify-center gap-2">
                <span>⚡ Generate Content</span>
            </button>
        </div>

        <!-- Output Panel -->
        <div class="md:col-span-2 bg-slate-800/40 p-5 rounded-xl border border-slate-800 flex flex-col min-h-[400px]">
            <div class="flex justify-between items-center border-b border-slate-700 pb-2 mb-4">
                <h2 class="text-lg font-semibold text-slate-200">Generated Output</h2>
                <button onclick="copyOutput()" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded transition text-slate-300">
                    📋 Copy Text
                </button>
            </div>
            
            <div id="loader" class="hidden flex-1 flex flex-col items-center justify-center gap-2 text-indigo-400">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-500"></div>
                <span class="text-sm text-slate-400">Generating response...</span>
            </div>

            <div id="output" class="text-sm leading-relaxed whitespace-pre-wrap text-slate-300 overflow-y-auto max-h-[500px] flex-1">
                Your AI-generated content will appear here...
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
