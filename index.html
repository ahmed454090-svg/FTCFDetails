<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0F172A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Smart Budget - Global Micro Cashflow Manager</title>
    <style>
        :root {
            --bg-color: #0F172A;
            --card-bg: #1E293B;
            --accent-blue: #2563EB;
            --accent-hover: #1D4ED8;
            --text-primary: #FFFFFF;
            --text-secondary: #94A3B8;
            --border-color: #334155;
            --success-green: #22C55E;
            --warning-yellow: #EAB308;
            --danger-red: #EF4444;
            --chat-bubble: #1E293B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            padding: 16px;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
        }

        .action-tools {
            display: flex;
            gap: 6px;
        }

        .btn-tool {
            background: #334155;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: background 0.2s;
        }

        .btn-tool:active {
            background: var(--accent-blue);
        }

        .currency-select {
            background: #334155;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 4px 6px;
            border-radius: 8px;
            font-size: 11px;
            outline: none;
            cursor: pointer;
        }

        .balance-title {
            font-size: 32px;
            font-weight: 800;
            margin: 10px 0 14px 0;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .progress-bar-bg {
            background-color: var(--border-color);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 14px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 100%;
            background-color: var(--success-green);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.4s ease;
        }

        /* Daily Limit Warning Banner */
        .limit-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px dashed var(--border-color);
            border-radius: 12px;
            padding: 12px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .limit-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .limit-amount {
            font-weight: 700;
            color: var(--accent-blue);
        }

        .warning-badge {
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .badge-safe { background: rgba(34, 197, 94, 0.15); color: var(--success-green); border: 1px solid rgba(34, 197, 94, 0.3); }
        .badge-warn { background: rgba(234, 179, 8, 0.15); color: var(--warning-yellow); border: 1px solid rgba(234, 179, 8, 0.3); }
        .badge-danger { background: rgba(239, 68, 68, 0.15); color: var(--danger-red); border: 1px solid rgba(239, 68, 68, 0.3); }

        .form-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .input-row {
            display: flex;
            gap: 8px;
        }

        input {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent-blue);
        }

        .amount-field { width: 40%; }
        .note-field { width: 60%; }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s;
        }

        .btn-add {
            background-color: var(--accent-blue);
            color: white;
            flex-grow: 1;
        }

        .btn-add:hover {
            background-color: var(--accent-hover);
        }

        .btn-mic {
            background-color: #334155;
            color: white;
            width: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .btn-mic.listening {
            background-color: var(--danger-red);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* WhatsApp Style Chat Logs */
        .history-card {
            background-color: var(--bg-color);
            border-radius: 20px;
            padding: 12px;
            border: 1px solid var(--border-color);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .history-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .history-title {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
        }

        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 380px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .chat-bubble {
            align-self: flex-end;
            background-color: #1E293B;
            border: 1px solid #334155;
            border-left: 4px solid var(--danger-red);
            border-radius: 14px 14px 2px 14px;
            padding: 10px 14px;
            max-width: 88%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 4px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }

        .chat-note {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .chat-amount {
            font-size: 15px;
            font-weight: 700;
            color: var(--danger-red);
        }

        .chat-footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: var(--text-secondary);
        }

        .ticks { color: #38BDF8; font-size: 12px; }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
            padding: 30px 0;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Top Budget Header -->
        <div class="header-card">
            <div class="header-top">
                <div class="subtitle">Remaining Monthly Budget</div>
                <div class="action-tools">
                    <select class="currency-select" id="currencySelect" onchange="changeCurrency()">
                        <option value="Rs. ">PKR (Rs.)</option>
                        <option value="$">USD ($)</option>
                        <option value="€">EUR (€)</option>
                        <option value="£">GBP (£)</option>
                        <option value="₹">INR (₹)</option>
                    </select>
                    <button class="btn-tool" onclick="changeMonthlyBudget()">⚙️ Target</button>
                </div>
            </div>
            <div class="balance-title" id="balanceDisplay">Rs. 0.00</div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="healthBar"></div>
            </div>

            <!-- Daily Limit & Warning System -->
            <div class="limit-card">
                <div class="limit-info">
                    <span style="font-size: 11px; color: var(--text-secondary);">Today's Recommended Limit</span>
                    <span class="limit-amount" id="dailyLimitText">Rs. 0 / day</span>
                </div>
                <div id="statusBadge" class="warning-badge badge-safe">🟢 Safe</div>
            </div>
        </div>

        <!-- Expense Input Form -->
        <div class="form-card">
            <div class="input-row">
                <input type="number" id="amountInput" class="amount-field" placeholder="Amount">
                <input type="text" id="noteInput" class="note-field" placeholder="Note (e.g. Petrol)">
            </div>
            <div class="btn-group">
                <button class="btn-mic" id="micBtn" onclick="toggleVoiceInput()" title="Voice Entry">🎙️</button>
                <button class="btn-add" onclick="addExpense()">+ Add Expense</button>
            </div>
        </div>

        <!-- WhatsApp Style Log -->
        <div class="history-card">
            <div class="history-header-row">
                <span class="history-title">Cashflow Stream Log</span>
                <div style="display: flex; gap: 6px;">
                    <button class="btn-tool" onclick="exportToCSV()" title="Export CSV Data">📥 Export</button>
                    <button class="btn-tool" onclick="clearAllData()" style="color: var(--danger-red);" title="Clear All">🗑️ Clear</button>
                </div>
            </div>
            <div class="chat-list" id="chatList">
                <!-- Chat Bubbles rendered here -->
            </div>
        </div>
    </div>

    <script>
        let selectedCurrency = localStorage.getItem('smart_currency') || 'Rs. ';
        let monthlyBudget = parseFloat(localStorage.getItem('smart_monthly_budget')) || 50000;
        let transactions = JSON.parse(localStorage.getItem('smart_budget_data')) || [];

        // Set initial selector value
        document.getElementById('currencySelect').value = selectedCurrency;

        function changeCurrency() {
            selectedCurrency = document.getElementById('currencySelect').value;
            localStorage.setItem('smart_currency', selectedCurrency);
            updateUI();
        }

        function changeMonthlyBudget() {
            const newBudget = prompt("Set Your Monthly Budget Target:", monthlyBudget);
            if (newBudget !== null && !isNaN(parseFloat(newBudget)) && parseFloat(newBudget) > 0) {
                monthlyBudget = parseFloat(newBudget);
                localStorage.setItem('smart_monthly_budget', monthlyBudget);
                updateUI();
            }
        }

        function getDaysRemainingInMonth() {
            const now = new Date();
            const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            return (lastDay - now.getDate()) + 1;
        }

        function getTodaySpent() {
            const todayStr = new Date().toLocaleDateString();
            return transactions
                .filter(t => t.rawDate === todayStr)
                .reduce((sum, t) => sum + parseFloat(t.amount), 0);
        }

        function updateUI() {
            const chatElement = document.getElementById('chatList');
            chatElement.innerHTML = '';

            let totalSpent = 0;

            if (transactions.length === 0) {
                chatElement.innerHTML = '<div class="empty-state">No expense logs yet. Add or speak your entry!</div>';
            } else {
                transactions.slice().reverse().forEach((item) => {
                    totalSpent += parseFloat(item.amount);

                    const bubble = document.createElement('div');
                    bubble.className = 'chat-bubble';
                    bubble.innerHTML = `
                        <div class="chat-header">
                            <span class="chat-note">${item.note}</span>
                            <span class="chat-amount">- ${selectedCurrency}${parseFloat(item.amount).toFixed(0)}</span>
                        </div>
                        <div class="chat-footer">
                            <span>${item.time}</span>
                            <span class="ticks">✓✓</span>
                        </div>
                    `;
                    chatElement.appendChild(bubble);
                });
            }

            // Calculations
            const remaining = monthlyBudget - totalSpent;
            document.getElementById('balanceDisplay').innerText = `${selectedCurrency}${remaining.toLocaleString('en-US', {minimumFractionDigits: 2})}`;

            // Health Bar Math
            let healthPercent = (remaining / monthlyBudget) * 100;
            if (healthPercent < 0) healthPercent = 0;

            const healthBar = document.getElementById('healthBar');
            healthBar.style.width = `${healthPercent}%`;

            // Daily Limit Warning Logic
            const daysLeft = getDaysRemainingInMonth();
            const dailyRecommended = remaining > 0 ? (remaining / daysLeft) : 0;
            document.getElementById('dailyLimitText').innerText = `${selectedCurrency}${Math.round(dailyRecommended).toLocaleString()} / day`;

            const todaySpent = getTodaySpent();
            const statusBadge = document.getElementById('statusBadge');

            if (remaining <= 0) {
                healthBar.style.backgroundColor = 'var(--danger-red)';
                statusBadge.className = 'warning-badge badge-danger';
                statusBadge.innerText = '🔴 Budget Exhausted';
            } else if (todaySpent > dailyRecommended) {
                healthBar.style.backgroundColor = 'var(--warning-yellow)';
                statusBadge.className = 'warning-badge badge-warn';
                statusBadge.innerText = '⚠️ Over Daily Limit';
            } else {
                healthBar.style.backgroundColor = 'var(--success-green)';
                statusBadge.className = 'warning-badge badge-safe';
                statusBadge.innerText = '🟢 Safe Limit';
            }
        }

        function addExpense() {
            const amountInput = document.getElementById('amountInput');
            const noteInput = document.getElementById('noteInput');

            const amount = parseFloat(amountInput.value);
            const note = noteInput.value.trim() || 'General Expense';

            if (isNaN(amount) || amount <= 0) {
                alert('Please enter a valid amount!');
                return;
            }

            const now = new Date();
            const newTransaction = {
                amount: amount,
                note: note,
                rawDate: now.toLocaleDateString(),
                time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            };

            transactions.push(newTransaction);
            localStorage.setItem('smart_budget_data', JSON.stringify(transactions));

            amountInput.value = '';
            noteInput.value = '';

            updateUI();
        }

        // CSV Export Feature
        function exportToCSV() {
            if (transactions.length === 0) {
                alert("No transactions to export!");
                return;
            }
            let csvContent = "data:text/csv;charset=utf-8,Date,Time,Note,Amount (" + selectedCurrency + ")\n";
            transactions.forEach(t => {
                csvContent += `"${t.rawDate}","${t.time}","${t.note}",${t.amount}\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "cashflow_report.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Clear Data Feature
        function clearAllData() {
            if (confirm("Are you sure you want to clear all transactions? This cannot be undone.")) {
                transactions = [];
                localStorage.removeItem('smart_budget_data');
                updateUI();
            }
        }

        // 🎙️ Voice Recognition Engine
        let recognition;
        function toggleVoiceInput() {
            const micBtn = document.getElementById('micBtn');

            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('Voice Input is not supported on this browser. Try Chrome or Safari.');
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (micBtn.classList.contains('listening')) {
                recognition.stop();
                micBtn.classList.remove('listening');
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;

            recognition.onstart = function() {
                micBtn.classList.add('listening');
            };

            recognition.onresult = function(event) {
                const speechText = event.results[0][0].transcript;
                micBtn.classList.remove('listening');
                parseVoiceInput(speechText);
            };

                micBtn.classList.remove('listening');
                alert('Could not recognize voice. Please try again.');
