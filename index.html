<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuCraft | Document Generator</title>
    
    <!-- Local / Fallback Styles -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #050505; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Direct CSS Display Toggle (Faster & Independent of external JS) */
        .tab-content { display: none !important; padding-top: 70px; padding-bottom: 100px; }
        .tab-content.active { display: block !important; }

        /* Fixed Navigation */
        .nav-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 450px; height: 60px;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px; display: flex; justify-content: space-around;
            align-items: center; z-index: 1000; backdrop-filter: blur(10px);
        }

        .nav-btn {
            background: none; border: none; color: #64748b; font-size: 11px;
            font-weight: 600; cursor: pointer; display: flex; flex-direction: column;
            align-items: center; gap: 4px; width: 25%; height: 100%; justify-content: center;
        }

        .nav-btn.active-btn { color: #f59e0b; text-shadow: 0 0 10px rgba(245, 158, 11, 0.4); }

        /* Splash Screen Fix */
        #splash {
            position: fixed; inset: 0; z-index: 9000;
            background: #090d16; display: flex; flex-direction: column;
            justify-content: center; align-items: center; pointer-events: none; /* Allows clicks through if stuck */
        }

        .card {
            background: #121212; border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 20px; margin: 0 auto 20px auto; max-width: 600px;
        }

        .print-area { background: #ffffff; color: #000; padding: 20px; border-radius: 12px; min-height: 300px; }
        
        @media print {
            body * { visibility: hidden; }
            .printable, .printable * { visibility: visible; }
            .printable { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>

    <!-- External Assets -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash">
        <h1 style="color:#f59e0b; font-size:24px; font-weight:800;">DOCUCRAFT</h1>
        <p style="color:#64748b; font-size:12px; margin-top:5px;">Loading Workspace...</p>
    </div>

    <!-- MAIN CONTENT -->
    <main style="padding: 20px;">
        <!-- Tab 1 -->
        <section id="invoice" class="tab-content active">
            <div class="card">
                <h2 style="color:#f59e0b; margin-bottom:15px;">Invoice Section</h2>
                <div class="printable print-area">
                    <h3>INVOICE FORM</h3>
                    <p>Bill To: <input type="text" style="border-bottom:1px solid #000; outline:none;"></p>
                </div>
            </div>
        </section>

        <!-- Tab 2 -->
        <section id="letterhead" class="tab-content">
            <div class="card">
                <h2 style="color:#f59e0b; margin-bottom:15px;">Letterhead Section</h2>
                <div class="printable print-area">
                    <h3>OFFICIAL LETTERHEAD</h3>
                    <textarea style="width:100%; height:150px; margin-top:10px;" placeholder="Document body..."></textarea>
                </div>
            </div>
        </section>

        <!-- Tab 3 -->
        <section id="receipt" class="tab-content">
            <div class="card">
                <h2 style="color:#f59e0b; margin-bottom:15px;">Receipt Section</h2>
                <div class="printable print-area">
                    <h3>RECEIPT FORM</h3>
                    <p>Amount: <input type="text" style="border-bottom:1px solid #000; outline:none;"></p>
                </div>
            </div>
        </section>

        <!-- Tab 4 -->
        <section id="register" class="tab-content">
            <div class="card">
                <h2 style="color:#f59e0b; margin-bottom:15px;">Registration Section</h2>
                <div class="printable print-area">
                    <h3>REGISTRATION FORM</h3>
                    <p>Member Name: <input type="text" style="border-bottom:1px solid #000; outline:none;"></p>
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav class="nav-bar">
        <button class="nav-btn active-btn" onclick="openTab('invoice', this)">
            <i class="fas fa-file-invoice" style="font-size:16px;"></i>
            <span>Invoice</span>
        </button>
        <button class="nav-btn" onclick="openTab('letterhead', this)">
            <i class="fas fa-file-alt" style="font-size:16px;"></i>
            <span>Letterhead</span>
        </button>
        <button class="nav-btn" onclick="openTab('receipt', this)">
            <i class="fas fa-receipt" style="font-size:16px;"></i>
            <span>Receipt</span>
        </button>
        <button class="nav-btn" onclick="openTab('register', this)">
            <i class="fas fa-id-card" style="font-size:16px;"></i>
            <span>Register</span>
        </button>
    </nav>

    <script>
        // Force hide splash when DOM loads
        window.addEventListener('DOMContentLoaded', function() {
            var splash = document.getElementById('splash');
            if(splash) splash.style.display = 'none';
        });

        // Fail-safe Tab Switching Function
        function openTab(tabId, btnElement) {
            try {
                // 1. Hide all tabs
                var tabs = document.querySelectorAll('.tab-content');
                for (var i = 0; i < tabs.length; i++) {
                    tabs[i].classList.remove('active');
                }

                // 2. Remove active state from all buttons
                var btns = document.querySelectorAll('.nav-btn');
                for (var j = 0; j < btns.length; j++) {
                    btns[j].classList.remove('active-btn');
                }

                // 3. Activate target tab and button
                var targetTab = document.getElementById(tabId);
                if (targetTab) {
                    targetTab.classList.add('active');
                }

                if (btnElement) {
                    btnElement.classList.add('active-btn');
                }
            } catch (err) {
                console.error("Tab switch error: ", err);
            }
        }
    </script>
</body>
</html>
